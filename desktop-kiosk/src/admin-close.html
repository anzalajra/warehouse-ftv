<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Admin Close</title>
<style>
  body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #1f2937; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; -webkit-app-region: drag; }
  .card { background: #fff; color: #111; padding: 24px 28px; border-radius: 14px; box-shadow: 0 25px 50px rgba(0,0,0,.35); width: 320px; -webkit-app-region: no-drag; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  p { font-size: 13px; color: #555; margin: 0 0 16px; }
  input { width: 100%; box-sizing: border-box; padding: 12px; font-size: 18px; letter-spacing: 6px; text-align: center; border: 2px solid #d1d5db; border-radius: 10px; outline: none; }
  input:focus { border-color: #2563eb; }
  .row { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; padding: 11px 0; border: 0; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .ok { background: #2563eb; color: #fff; }
  .cancel { background: #e5e7eb; color: #111; }
  .err { color: #b91c1c; font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Admin Close</h1>
    <p>Masukkan PIN admin untuk menutup aplikasi kiosk.</p>
    <input id="pin" type="password" inputmode="numeric" autocomplete="off" autofocus />
    <div class="err" id="err"></div>
    <div class="row">
      <button class="cancel" id="cancel">Batal</button>
      <button class="ok" id="ok">Konfirmasi</button>
    </div>
  </div>

<script>
const { ipcRenderer } = require('electron');
const pin = document.getElementById('pin');
const err = document.getElementById('err');

async function submit() {
  const value = pin.value.trim();
  if (!value) return;
  const ok = await ipcRenderer.invoke('admin:verify-pin', value);
  if (ok) {
    ipcRenderer.send('admin:close-confirmed');
  } else {
    err.textContent = 'PIN salah.';
    pin.value = '';
    pin.focus();
  }
}

document.getElementById('ok').addEventListener('click', submit);
document.getElementById('cancel').addEventListener('click', () => ipcRenderer.send('admin:close-cancelled'));
pin.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submit();
  if (e.key === 'Escape') ipcRenderer.send('admin:close-cancelled');
});
</script>
</body>
</html>
