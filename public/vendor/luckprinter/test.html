<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LuckPrinter — Uji Cetak</title>
<style>
  :root { --bg:#0f172a; --card:#fff; --line:#e2e8f0; --muted:#64748b; --pri:#2563eb; --pri2:#1d4ed8; --ok:#16a34a; --err:#dc2626; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:#f1f5f9; color:#0f172a; }
  header { background:var(--bg); color:#fff; padding:14px 20px; display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .tag { font-size:11px; background:#1e293b; color:#94a3b8; padding:3px 8px; border-radius:999px; }
  .wrap { display:grid; grid-template-columns: 1fr 360px; gap:16px; padding:16px; max-width:1100px; margin:0 auto; }
  @media (max-width: 820px){ .wrap{ grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:0 0 12px; }
  label.f { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input, select, textarea, button { font:inherit; }
  input[type=text], input[type=number], select, textarea {
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:#fff;
  }
  textarea { resize:vertical; min-height:60px; }
  .row { display:flex; gap:10px; } .row > * { flex:1; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 14px; border-radius:9px; border:0; cursor:pointer; font-weight:600; }
  .btn.pri { background:var(--pri); color:#fff; } .btn.pri:hover{ background:var(--pri2); }
  .btn.ghost { background:#f1f5f9; color:#0f172a; border:1px solid var(--line); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .pill { font-size:12px; padding:4px 10px; border-radius:999px; background:#f1f5f9; color:var(--muted); }
  .pill.ok { background:#dcfce7; color:#166534; } .pill.err{ background:#fee2e2; color:#991b1b; }
  .preview { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .stage { background:repeating-conic-gradient(#eef2f7 0% 25%, #fff 0% 50%) 0/16px 16px; padding:14px; border-radius:10px; border:1px solid var(--line); }
  canvas#preview { image-rendering: pixelated; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.12); }
  .log { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size:11px; background:#0b1220; color:#a5f3fc; border-radius:8px; padding:10px; height:150px; overflow:auto; white-space:pre-wrap; }
  .banner { padding:10px 12px; border-radius:8px; font-size:13px; margin:0 0 12px; }
  .banner.warn { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
  .banner.err { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
  .hint { font-size:11px; color:var(--muted); margin-top:4px; }
  .seg { display:flex; gap:6px; } .seg label{ flex:1; }
  .seg input{ display:none; }
  .seg span { display:block; text-align:center; padding:7px; border:1px solid var(--line); border-radius:8px; font-size:12px; cursor:pointer; }
  .seg input:checked + span { background:var(--pri); color:#fff; border-color:var(--pri); }
</style>
</head>
<body>
<header>
  <h1>🖨️ LuckPrinter</h1>
  <span class="tag">Web Bluetooth · Luck Jingle</span>
  <span id="connPill" class="pill" style="margin-left:auto">Belum terhubung</span>
</header>

<div id="supportBanner"></div>

<div class="wrap">
  <!-- Kiri: editor + preview -->
  <div class="card">
    <h2>Desain Label</h2>

    <label class="f">Seri printer (filter)</label>
    <select id="scope">
      <option value="label">Seri label mini (L10/L12/L13/L15/C16/MPL11)</option>
      <option value="all">Semua model didukung</option>
      <option value="any">Tampilkan semua perangkat Bluetooth</option>
    </select>

    <div class="row" style="margin-top:12px">
      <div>
        <label class="f">Lebar cetak (dots)</label>
        <input type="number" id="widthDots" value="96" min="8" max="1024" />
        <div class="hint">L12 & seri mini = 96 (12mm)</div>
      </div>
      <div>
        <label class="f">Panjang label (mm)</label>
        <select id="lengthPreset">
          <option value="30">30 mm</option>
          <option value="40" selected>40 mm</option>
          <option value="50">50 mm</option>
          <option value="custom">Custom…</option>
        </select>
        <input type="number" id="lengthCustom" value="40" min="5" max="300" style="display:none;margin-top:6px" />
      </div>
    </div>

    <label class="f">Teks (boleh beberapa baris)</label>
    <textarea id="text">FILM TELEVISI
Rak A-12 · Qty 24</textarea>
    <div class="row">
      <div>
        <label class="f">Ukuran teks (dots)</label>
        <input type="number" id="fontSize" value="18" min="6" max="64" />
      </div>
      <div>
        <label class="f">Perataan</label>
        <select id="align"><option value="left">Kiri</option><option value="center" selected>Tengah</option><option value="right">Kanan</option></select>
      </div>
      <div>
        <label class="f">Tebal</label>
        <select id="bold"><option value="0">Normal</option><option value="1">Bold</option></select>
      </div>
    </div>

    <label class="f">QR Code (kosongkan bila tak perlu)</label>
    <input type="text" id="qr" value="https://warehouse-ftv.local/item/A-12" />
    <div class="row">
      <div>
        <label class="f">Ukuran QR (dots)</label>
        <input type="number" id="qrSize" value="72" min="20" max="400" />
      </div>
      <div>
        <label class="f">Posisi QR</label>
        <select id="qrPos"><option value="bottom" selected>Bawah teks</option><option value="top">Atas teks</option></select>
      </div>
    </div>

    <label class="f">Gambar (opsional)</label>
    <input type="file" id="imgFile" accept="image/*" />
    <div class="row" style="margin-top:6px">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)"><input type="checkbox" id="dither" checked style="width:auto" /> Dithering (untuk foto)</label>
      <button class="btn ghost" id="clearImg" type="button">Hapus gambar</button>
    </div>

    <hr style="border:0;border-top:1px solid var(--line);margin:16px 0" />
    <div class="preview">
      <div class="stage"><canvas id="preview"></canvas></div>
      <div class="hint">Preview (diperbesar 3×). Hitam = tercetak.</div>
    </div>
  </div>

  <!-- Kanan: koneksi & cetak -->
  <div class="card">
    <h2>Koneksi & Cetak</h2>
    <div class="row">
      <button class="btn pri" id="btnConnect">🔌 Hubungkan</button>
      <button class="btn ghost" id="btnDisconnect" disabled>Putus</button>
    </div>
    <div id="modelInfo" class="hint" style="margin-top:8px"></div>

    <label class="f">Kepekatan (density)</label>
    <div class="seg" id="density">
      <label><input type="radio" name="d" value="0"><span>Tipis</span></label>
      <label><input type="radio" name="d" value="1" checked><span>Normal</span></label>
      <label><input type="radio" name="d" value="2"><span>Tebal</span></label>
    </div>

    <div class="row" style="margin-top:12px">
      <div>
        <label class="f">Jumlah salinan</label>
        <input type="number" id="copies" value="1" min="1" max="50" />
      </div>
      <div>
        <label class="f">Threshold (0-255)</label>
        <input type="number" id="threshold" value="128" min="1" max="254" />
      </div>
    </div>

    <button class="btn pri" id="btnPrint" style="width:100%;margin-top:14px" disabled>🖨️ Cetak</button>
    <button class="btn ghost" id="btnStatus" style="width:100%;margin-top:8px" disabled>Cek status printer</button>
    <div id="statusBox" class="hint" style="margin-top:8px"></div>

    <h2 style="margin-top:18px">Log</h2>
    <div class="log" id="log"></div>
  </div>
</div>

<script type="module">
import {
  isSupported, connectLuckPrinter, createLabelCanvas, drawText, drawQR, drawImage, mmToDots,
} from './luckprinter.js';

const $ = (id) => document.getElementById(id);
const logEl = $('log');
function log(msg){ logEl.textContent += msg + '\n'; logEl.scrollTop = logEl.scrollHeight; }

let printer = null;
let loadedImage = null;
const ZOOM = 3;

// ---- cek dukungan browser ----
if (!isSupported()) {
  const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  $('supportBanner').innerHTML = `<div class="wrap"><div class="banner err" style="grid-column:1/-1">
    ⚠️ Browser ini <b>tidak mendukung Web Bluetooth</b>${isiOS ? ' — iPhone/iPad tidak bisa.' : ''}.
    Gunakan <b>Chrome</b> atau <b>Edge</b> di Android, Windows, atau Mac.</div></div>`;
  $('btnConnect').disabled = true;
}

// ---- panjang label preset/custom ----
$('lengthPreset').addEventListener('change', () => {
  const custom = $('lengthPreset').value === 'custom';
  $('lengthCustom').style.display = custom ? 'block' : 'none';
  render();
});
function lengthMm(){
  return $('lengthPreset').value === 'custom' ? +$('lengthCustom').value : +$('lengthPreset').value;
}

// ---- bangun canvas label (dipakai preview & cetak) ----
function buildLabelCanvas(){
  const width = +$('widthDots').value;
  const height = mmToDots(lengthMm(), 203);
  const { canvas, ctx } = createLabelCanvas(width, height);
  const pad = 4;
  const gap = 6;
  let y = pad;

  const txt = $('text').value.trim();
  const qrText = $('qr').value.trim();
  const fontSize = +$('fontSize').value;
  const align = $('align').value;
  const bold = $('bold').value === '1';
  const qrSize = Math.min(+$('qrSize').value, width - 2*pad);
  const qrTop = $('qrPos').value === 'top';

  const drawTheText = () => {
    if (txt){ y = drawText(ctx, txt, { x:pad, y, size:fontSize, align, bold, maxWidth: width-2*pad }); y += gap; }
  };
  const drawTheQR = () => {
    if (qrText){ const r = drawQR(ctx, qrText, { x:(width-qrSize)/2, y, size:qrSize }); y += r.size + gap; }
  };

  if (loadedImage){
    drawImage(ctx, loadedImage, { x:pad, y, w:width-2*pad, h:height-y-pad, fit:'contain', dither:$('dither').checked });
  } else if (qrTop){ drawTheQR(); drawTheText(); }
  else { drawTheText(); drawTheQR(); }

  return canvas;
}

// ---- preview ----
function render(){
  const src = buildLabelCanvas();
  const pv = $('preview');
  pv.width = src.width * ZOOM;
  pv.height = src.height * ZOOM;
  const ctx = pv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0,0,pv.width,pv.height);
  ctx.drawImage(src, 0, 0, pv.width, pv.height);
}
['widthDots','lengthCustom','text','fontSize','align','bold','qr','qrSize','qrPos','dither'].forEach(id => {
  $(id).addEventListener('input', render); $(id).addEventListener('change', render);
});

// ---- gambar ----
$('imgFile').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  loadedImage = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; });
  render();
});
$('clearImg').addEventListener('click', () => { loadedImage=null; $('imgFile').value=''; render(); });

// ---- koneksi ----
$('btnConnect').addEventListener('click', async () => {
  try {
    printer = new (await import('./driver.js')).LuckPrinter();
    printer.addEventListener('log', e => log(e.detail));
    printer.addEventListener('disconnected', () => setConnected(false));
    printer.addEventListener('status', e => showStatus(e.detail));
    printer.addEventListener('progress', e => log(`Progress: salinan ${e.detail.copy}/${e.detail.copies}`));

    const { name, model } = await connectLuckPrinter({ scope: $('scope').value, printer });
    setConnected(true);
    $('modelInfo').innerHTML = `Terhubung: <b>${name||'?'}</b>` + (model ? ` — model <b>${model.name}</b> (${model.printWidthDots} dots)` : ' — model tidak dikenal (pakai protokol default)');
    if (model) { $('widthDots').value = model.printWidthDots; render(); }
  } catch (err) { log('❌ ' + err.message); }
});
$('btnDisconnect').addEventListener('click', () => printer?.disconnect());

function setConnected(on){
  $('connPill').textContent = on ? 'Terhubung' : 'Belum terhubung';
  $('connPill').className = 'pill ' + (on ? 'ok' : '');
  $('btnPrint').disabled = !on; $('btnDisconnect').disabled = !on; $('btnStatus').disabled = !on;
}

// ---- cetak ----
$('btnPrint').addEventListener('click', async () => {
  if(!printer) return;
  $('btnPrint').disabled = true;
  try {
    const density = +document.querySelector('input[name=d]:checked').value;
    await printer.cmdDensity(density);
    const canvas = buildLabelCanvas();
    const { buildRaster } = await import('./driver.js');
    const raster = buildRaster(canvas, { threshold: +$('threshold').value });
    await printer.printRaster(raster, { copies: +$('copies').value, mode:'label' });
    log('✅ Selesai mencetak.');
  } catch (err) { log('❌ ' + err.message); }
  $('btnPrint').disabled = false;
});

$('btnStatus').addEventListener('click', () => printer?.requestStatus());
function showStatus(s){
  const parts = [];
  if (s.isCoverOpen) parts.push('penutup terbuka');
  if (s.isLackPaper) parts.push('kehabisan kertas');
  if (s.isLowBattery) parts.push('baterai lemah');
  if (s.isOverheat) parts.push('panas berlebih');
  if (s.isCharging) parts.push('mengisi daya');
  $('statusBox').textContent = 'Status: ' + (parts.length ? parts.join(', ') : 'normal') + ` (0x${s.raw.toString(16)})`;
}

render();
</script>
</body>
</html>
